<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Profile - Summary</title>
  <link rel="stylesheet" href="../../../assets/css/base.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    .profile-header { margin-bottom: 8px; }
    .patient-title { font-size: 28px; font-weight: 700; color: #2C3E50; margin: 0; }
    .patient-subtitle { font-size: 20px; font-style: italic; color: #7F8C8D; margin: 4px 0 24px 0; }
    .subject-selector { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding: 16px; background: #f8fafc; border-radius: 8px; }
    .subject-selector label { font-weight: 500; color: var(--text-secondary); }
    .subject-selector select { padding: 10px 16px; font-size: 14px; border: 1px solid var(--border-light); border-radius: 6px; min-width: 200px; }
    
    .summary-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .summary-table th { background: #34495E; color: white; font-weight: bold; font-size: 18px; padding: 12px 16px; text-align: left; }
    .summary-table td { padding: 12px 16px; font-size: 15px; color: #34495E; border: 1px solid #D3D3D3; }
    .summary-table td:first-child { width: 35%; }
    .summary-table td:last-child { width: 65%; }
    .section-header td { font-weight: bold; }
    .section-site { background: #E8F4F8; }
    .section-demo { background: #FFF5E6; }
    .section-dates { background: #F0F8FF; }
    .section-clinical { background: #F5F5F5; }
    .no-data { text-align: center; padding: 60px; color: #7F8C8D; font-size: 18px; }
  </style>
</head>
<body>
  <header id="global-nav"></header>
  <nav class="local-tabs">
    <button class="local-tab" onclick="location.href='../patient-list.html'">Patient List</button>
    <button class="local-tab active">Summary</button>
    <button class="local-tab" onclick="location.href='medical-history.html'+location.search">Medical History</button>
    <button class="local-tab" onclick="location.href='visit-compliance.html'+location.search">Visit Compliance</button>
    <button class="local-tab" onclick="location.href='dose-ae-lab.html'+location.search">Dose & AE & Lab (normalized)</button>
    <button class="local-tab" onclick="location.href='dose-ae-lab-absolute.html'+location.search">Dose & AE & Lab (absolute)</button>
    <button class="local-tab" onclick="location.href='dosing-history.html'+location.search">Dosing History</button>
    <button class="local-tab" onclick="location.href='ae-teae.html'+location.search">TEAE</button>
    <button class="local-tab" onclick="location.href='cm-timeline.html'+location.search">CM Timeline</button>
    <button class="local-tab" onclick="location.href='cm-prior-tx.html'+location.search">Prior Tx</button>
    <button class="local-tab" onclick="location.href='vitals.html'+location.search">Vitals</button>
    <button class="local-tab" onclick="location.href='ecg-qtcf.html'+location.search">ECG/QTcF</button>
    <button class="local-tab" onclick="location.href='labs.html'+location.search">Labs</button>
  </nav>
  <main class="page-content">
    <div class="profile-header">
      <h1 class="patient-title">Patient Profile Summary</h1>
      <p class="patient-subtitle" id="patientSubtitle">Subject: Loading...</p>
    </div>
    <div class="subject-selector">
      <label for="subjectSelect">Select Subject:</label>
      <select id="subjectSelect"></select>
    </div>
    <div class="card">
      <div id="summaryContent"><div class="no-data">Loading data...</div></div>
    </div>
  </main>
  <script src="../../../assets/js/nav.js"></script>
  <script>
    renderNav('patients', 'pp-summary', '../../../');
    let dmmrData = [], dsicData = [], dsenData = [], dsetData = [], dsesData = [], dmData = [], mhcanData = [], mhData = [], mhcaData = [], rsecog1Data = [];
    let cmpcCounts = {};
    let currentSubject = null;

    function parseSasDate(str) {
      if (!str || str.trim() === '') return null;
      const dateOnly = str.substring(0, 9);
      const months = {JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
      const day = parseInt(dateOnly.substring(0, 2));
      const mon = months[dateOnly.substring(2, 5).toUpperCase()];
      const year = parseInt(dateOnly.substring(5, 9));
      if (isNaN(day) || mon === undefined || isNaN(year)) return null;
      return new Date(year, mon, day);
    }
    function formatDate(date) { return date ? date.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' }) : ''; }
    function one(val) { return (val === null || val === undefined || val === '' || val === 'NA') ? '' : String(val).trim(); }
    /** Pick first non-empty value from row for any of the given column names (case-sensitive as in CSV headers). */
    function pick(row, ...keys) {
      if (!row) return '';
      for (const k of keys) { const v = row[k]; if (v !== null && v !== undefined && v !== '' && String(v).trim() !== '' && String(v) !== 'NA') return String(v).trim(); }
      return '';
    }
    async function loadCSV(path) {
      return new Promise(resolve => {
        Papa.parse(path, { download: true, header: true, skipEmptyLines: true, complete: r => resolve(r.data), error: () => resolve([]) });
      });
    }
    async function loadAllData() {
      const basePath = '../../../data/';
      [dmmrData, dsicData, dsenData, dsetData, dsesData, mhcanData, rsecog1Data] = await Promise.all([
        loadCSV(basePath + 'dmmr.csv'), loadCSV(basePath + 'dsic.csv'), loadCSV(basePath + 'dsen.csv'),
        loadCSV(basePath + 'dset.csv'), loadCSV(basePath + 'dses.csv'), loadCSV(basePath + 'mhcan.csv'), loadCSV(basePath + 'rsecog1.csv')
      ]);
      const dmCsv = await loadCSV(basePath + 'dm.CSV');
      const dmCsvLower = await loadCSV(basePath + 'dm.csv');
      dmData = (dmCsv && dmCsv.length) ? dmCsv : (dmCsvLower || []);
      const mhCsv = await loadCSV(basePath + 'mh.CSV');
      const mhCsvLower = await loadCSV(basePath + 'mh.csv');
      mhData = (mhCsv && mhCsv.length) ? mhCsv : (mhCsvLower || []);
      const mhcaCsv = await loadCSV(basePath + 'mhca.CSV');
      const mhcaCsvLower = await loadCSV(basePath + 'mhca.csv');
      mhcaData = (mhcaCsv && mhcaCsv.length) ? mhcaCsv : (mhcaCsvLower || []);
      for (const file of ['cmpc.csv', 'cmpc2.csv', 'cmpc3.csv', 'cmpc4.csv', 'cmpc5.csv', 'cmpc6.csv']) {
        const data = await loadCSV(basePath + file);
        for (const row of data) { const subj = row.Subject || row.SUBJID || row.Subjid; if (subj) cmpcCounts[subj] = (cmpcCounts[subj] || 0) + 1; }
      }
      const debug = new URLSearchParams(window.location.search).get('debug') === '1';
      if (debug) {
        const datasets = [
          { name: 'dmmr', data: dmmrData },
          { name: 'dsic', data: dsicData },
          { name: 'dsen', data: dsenData },
          { name: 'dset', data: dsetData },
          { name: 'dses', data: dsesData },
          { name: 'mhcan', data: mhcanData },
          { name: 'mh', data: mhData },
          { name: 'mhca', data: mhcaData },
          { name: 'dm', data: dmData },
          { name: 'rsecog1', data: rsecog1Data }
        ];
        datasets.forEach(({ name, data }) => {
          const cols = data.length && data[0] ? Object.keys(data[0]) : [];
          const rows3 = data.slice(0, 3);
          console.log(`[Summary debug] ${name} columns:`, cols);
          console.log(`[Summary debug] ${name} first 3 rows:`, rows3);
        });
      }
      populateSubjects();
    }
    function populateSubjects() {
      const subjects = [...new Set(dmmrData.map(r => r.Subject || r.SUBJID || r.Subjid).filter(Boolean))].sort();
      const select = document.getElementById('subjectSelect');
      select.innerHTML = subjects.map(s => `<option value="${s}">${s}</option>`).join('');
      const params = new URLSearchParams(window.location.search);
      currentSubject = params.get('id') || subjects[0];
      if (currentSubject && subjects.includes(currentSubject)) select.value = currentSubject;
      else currentSubject = subjects[0];
      select.addEventListener('change', e => { currentSubject = e.target.value; history.replaceState(null, '', `?id=${currentSubject}`); renderSummary(); });
      renderSummary();
    }
    function getRace(row) {
      const r = (v) => (v !== null && v !== undefined && v !== '' && String(v) !== '0');
      if (row && r(row.AMERICAN_INDIAN)) return 'AMERICAN_INDIAN';
      if (row && r(row.ASIAN)) return 'ASIAN';
      if (row && r(row.BLACK)) return 'BLACK';
      if (row && r(row.NATIVE_HAWAIIAN)) return 'NATIVE_HAWAIIAN';
      if (row && r(row.WHITE)) return 'WHITE';
      if (row && r(row.OTHER)) return 'OTHER';
      const raceCol = pick(row, 'RACE', 'Race', 'RACE_STD');
      return raceCol || '';
    }
    function subjMatch(r) {
      const sid = r.Subject || r.SUBJID || r.Subjid || '';
      return String(sid).trim() === String(currentSubject).trim();
    }
    function dsDate(row) {
      if (!row) return null;
      const s = pick(row, 'DSSTDAT_INT', 'DSSTDAT_RAW', 'DSSTDAT');
      return s ? parseSasDate(s) : null;
    }
    function parseAnyDate(str) {
      if (!str || String(str).trim() === '') return null;
      const s = String(str).trim();
      const parts = s.split('-');
      if (parts.length >= 3) return new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
      return parseSasDate(s);
    }
    function lastDoseDate(subj) {
      const dset = dsetData.find(r => String(r.Subject || r.SUBJID || r.Subjid || '').trim() === String(subj).trim());
      const s = pick(dset, 'DSDOSE1_INT', 'DSDOSE1_RAW', 'DSDOSE1', 'DSSTDAT_INT', 'DSSTDAT_RAW', 'DSSTDAT');
      return s ? parseSasDate(s) : (dset ? dsDate(dset) : null);
    }
    function getTreatmentStart(subj) {
      const dm = (dmData || []).find(r => String(r.SUBJID || r.Subject || r.USUBJID || '').trim() === String(subj).trim());
      const s = pick(dm, 'RFXSTDTC', 'RFXSTDT', 'TRTSDT');
      return s ? parseAnyDate(s) : null;
    }
    function getTreatmentEnd(subj) {
      const dm = (dmData || []).find(r => String(r.SUBJID || r.Subject || r.USUBJID || '').trim() === String(subj).trim());
      const s = pick(dm, 'RFXENDTC', 'RFXENDT');
      if (s) return parseAnyDate(s);
      const lastDose = lastDoseDate(subj);
      if (lastDose) return lastDose;
      const dsesRow = dsesData.find(r => String(r.Subject || r.SUBJID || '').trim() === String(subj).trim());
      return dsesRow ? dsDate(dsesRow) : null;
    }
    function getTreatmentDurationDays(subj) {
      const start = getTreatmentStart(subj);
      const end = getTreatmentEnd(subj);
      if (!start) return null;
      const endDate = end || new Date();
      const days = Math.round((endDate - start) / (1000 * 60 * 60 * 24));
      return days >= 0 ? days : null;
    }
    function getArm(subj) {
      const dm = (dmData || []).find(r => String(r.SUBJID || r.Subject || r.USUBJID || '').trim() === String(subj).trim());
      return pick(dm, 'ARM', 'Arm', 'ACTARM', 'COHORT');
    }
    function getStudyStatus(subj) {
      const dset = dsetData.find(r => String(r.Subject || r.SUBJID || '').trim() === String(subj).trim());
      const dses = dsesData.find(r => String(r.Subject || r.SUBJID || '').trim() === String(subj).trim());
      if (dses) return 'End of Study';
      if (dset) return 'End of Treatment';
      return 'On Treatment';
    }
    function getDiagnosis(subj) {
      const sid = (r) => String(r.Subject || r.SUBJID || r.Subjid || '').trim() === String(subj).trim();
      const mhcan = (mhcanData || []).find(sid);
      const fromMhcan = pick(mhcan, 'MHTERM1_STD', 'MHTERM1', 'MHTERM', 'MHCAT_STD', 'MHCAT');
      if (fromMhcan) return fromMhcan;
      const mhRows = (mhData || []).filter(sid);
      const first = mhRows[0];
      return pick(first, 'MHTERM', 'MHTERM_pt', 'MHCAT_STD', 'MHCAT');
    }
    function getELNRisk(subj) {
      const sid = (r) => String(r.Subject || r.SUBJID || r.Subjid || '').trim() === String(subj).trim();
      const mhcan = (mhcanData || []).find(sid);
      const fromMhcan = pick(mhcan, 'ELNRISKCAT_STD', 'ELNRISKCAT', 'ELN_RISK', 'RiskCategory');
      if (fromMhcan) return fromMhcan;
      const dmmr = dmmrData.find(sid) || {};
      const fromDmmr = pick(dmmr, 'ELNRISKCAT_STD', 'ELNRISKCAT', 'ELN_RISK', 'RiskCategory');
      if (fromDmmr) return fromDmmr;
      const mhca = (mhcaData && mhcaData.length ? mhcaData : mhcanData || []).find(sid);
      return pick(mhca, 'ELNRISKCAT_STD', 'ELNRISKCAT', 'MHCAT_STD', 'MHCAT');
    }
    function renderSummary() {
      const subj = currentSubject;
      document.getElementById('patientSubtitle').textContent = `Subject: ${subj}`;
      const dmmr = dmmrData.find(subjMatch) || {};
      const dsic = dsicData.find(r => subjMatch(r) && (r.FolderName || r.FOLDER || '').toString().includes('Screening'));
      const dsen = dsenData.find(subjMatch);
      const dset = dsetData.find(subjMatch);
      const dses = dsesData.find(subjMatch);
      const mhcan = mhcanData.find(subjMatch) || {};
      const ecog = rsecog1Data.find(subjMatch);
      
      const tableData = [
        { section: 'SITE INFORMATION', class: 'section-site' },
        { field: 'Study Site', value: pick(dmmr, 'Site', 'siteid', 'SITE'), class: 'section-site' },
        { field: 'Site Number', value: pick(dmmr, 'SiteNumber', 'StudyEnvSiteNumber', 'SITENUM'), class: 'section-site' },
        { section: 'DEMOGRAPHICS', class: 'section-demo' },
        { field: 'Date of Birth', value: formatDate(parseSasDate(pick(dmmr, 'BRTHYY_INT', 'BRTHDTC', 'BRTHDAT'))), class: 'section-demo' },
        { field: 'Age', value: pick(dmmr, 'AGE', 'Age'), class: 'section-demo' },
        { field: 'Sex', value: pick(dmmr, 'SEX_STD', 'SEX', 'Sex'), class: 'section-demo' },
        { field: 'Race', value: getRace(dmmr) || 'N/A', class: 'section-demo' },
        { field: 'Ethnicity', value: pick(dmmr, 'ETHNIC_STD', 'ETHNIC', 'Ethnicity') || 'N/A', class: 'section-demo' },
        { section: 'STUDY DATES', class: 'section-dates' },
        { field: 'Study Status', value: getStudyStatus(subj), class: 'section-dates' },
        { field: 'Screening Date', value: formatDate(dsic ? dsDate(dsic) : null), class: 'section-dates' },
        { field: 'Enrollment Date', value: formatDate(dsen ? dsDate(dsen) : null), class: 'section-dates' },
        { field: 'First Dose Date', value: formatDate(getTreatmentStart(subj)), class: 'section-dates' },
        { field: 'Last Dose Date', value: formatDate(lastDoseDate(subj)), class: 'section-dates' },
        { field: 'End-of-Treatment Date', value: formatDate(dset ? (lastDoseDate(subj) || dsDate(dset)) : null), class: 'section-dates' },
        { field: 'Reason for EOT', value: (() => { const r = pick(dset, 'DSET_DSDECOD_STD', 'DSET_DSDECOD', 'DSDECOD'); const other = pick(dset, 'DSTERM'); return r ? (other && (r === 'Other' || r === 'OTHER') ? `${r}: ${other}` : r) : 'N/A'; })(), class: 'section-dates' },
        { field: 'EOT Related AE', value: pick(dset, 'DSAENO_STD', 'DSAENO') || (dset ? '—' : 'N/A'), class: 'section-dates' },
        { field: 'End-of-Study Date', value: formatDate(dses ? dsDate(dses) : null), class: 'section-dates' },
        { field: 'Reason for EOS', value: (() => { const r = pick(dses, 'DSES_DSDECOD_STD', 'DSES_DSDECOD', 'DSDECOD'); const other = pick(dses, 'DSTERM'); return r ? (other && (r === 'Other' || r === 'OTHER') ? `${r}: ${other}` : r) : 'N/A'; })(), class: 'section-dates' },
        { field: 'EOS Other / Related AE', value: (() => { const o = pick(dses, 'DSTERM'); const ae = pick(dses, 'DSAENO_STD', 'DSAENO'); if (o || ae) return [o, ae].filter(Boolean).join('; '); return dses ? '—' : 'N/A'; })(), class: 'section-dates' },
        { field: 'Treatment Duration', value: (() => { const d = getTreatmentDurationDays(subj); return d != null ? `${d} days` : 'N/A'; })(), class: 'section-dates' },
        { section: 'CLINICAL INFORMATION', class: 'section-clinical' },
        { field: 'Arm / Cohort', value: getArm(subj) || 'N/A', class: 'section-clinical' },
        { field: 'ECOG', value: pick(ecog, 'ECOG101_RSSTRESC_STD', 'ECOG101_RSSTRESC', 'RSSTRESC') || 'N/A', class: 'section-clinical' },
        { field: '# of Prior Therapies', value: cmpcCounts[subj] != null ? cmpcCounts[subj] : 'N/A', class: 'section-clinical' },
        { field: 'ELN Risk Class', value: getELNRisk(subj) || 'N/A', class: 'section-clinical' },
        { field: 'Diagnosis', value: getDiagnosis(subj) || 'N/A', class: 'section-clinical' },
      ];
      let html = '<table class="summary-table"><thead><tr><th>Parameter</th><th>Value</th></tr></thead><tbody>';
      for (const row of tableData) {
        if (row.section) html += `<tr class="section-header ${row.class}"><td>${row.section}</td><td></td></tr>`;
        else html += `<tr class="${row.class}"><td>${row.field}</td><td>${row.value || ''}</td></tr>`;
      }
      html += '</tbody></table>';
      document.getElementById('summaryContent').innerHTML = html;
    }
    loadAllData();
  </script>
</body>
</html>
