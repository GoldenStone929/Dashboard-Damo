<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Patient Profile - Vital Signs</title>
  <link rel="stylesheet" href="../../../assets/css/base.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="../../../assets/js/block-export.js"></script>
  <style>
    .subject-selector { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; padding: 16px; background: #f8fafc; border-radius: 8px; }
    .subject-selector select { padding: 10px 16px; font-size: 14px; border: 1px solid var(--border-light); border-radius: 6px; min-width: 200px; }
    .charts-grid { display: grid; grid-template-columns: 1fr; gap: 24px; }
    .chart-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px; }
    .chart-card h4 { margin: 0 0 16px 0; font-size: 16px; color: #1e293b; }
    .chart-wrapper { height: 280px; position: relative; }
    .chart-wrapper canvas { max-height: 280px; }
    .no-data { text-align: center; padding: 60px; color: #7F8C8D; font-size: 18px; }
  </style>
</head>
<body>
  <header id="global-nav"></header>
  <nav class="local-tabs">
    <button class="local-tab" onclick="location.href='../patient-list.html'">Patient List</button>
    <button class="local-tab" onclick="location.href='summary.html'+location.search">Summary</button>
    <button class="local-tab" onclick="location.href='medical-history.html'+location.search">Medical History</button>
    <button class="local-tab" onclick="location.href='visit-compliance.html'+location.search">Visit Compliance</button>
    <button class="local-tab" onclick="location.href='dose-ae-lab.html'+location.search">Dose & AE & Lab (normalized)</button>
    <button class="local-tab" onclick="location.href='dose-ae-lab-absolute.html'+location.search">Dose & AE & Lab (absolute)</button>
    <button class="local-tab" onclick="location.href='dosing-history.html'+location.search">Dosing History</button>
    <button class="local-tab" onclick="location.href='ae-teae.html'+location.search">TEAE</button>
    <button class="local-tab" onclick="location.href='cm-timeline.html'+location.search">CM Timeline</button>
    <button class="local-tab" onclick="location.href='cm-prior-tx.html'+location.search">Prior Tx</button>
    <button class="local-tab active">Vitals</button>
    <button class="local-tab" onclick="location.href='ecg-qtcf.html'+location.search">ECG/QTcF</button>
    <button class="local-tab" onclick="location.href='labs.html'+location.search">Labs</button>
  </nav>
  <main class="page-content">
    <h1>Vital Signs</h1>
    <div class="subject-selector">
      <label for="subjectSelect">Select Subject:</label>
      <select id="subjectSelect"></select>
    </div>
    <div class="card" id="vitalsChartsExportBlock" style="position: relative;">
      <button class="export-btn" onclick="showBlockExportDialog('vitalsChartsExportBlock', 'Patient_Vitals')" style="position:absolute;top:16px;right:20px;z-index:5;background:#dc3545;color:white;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:bold;">Export</button>
      <div id="chartsContainer" class="charts-grid"></div>
    </div>
  </main>
  <script src="../../../assets/js/nav.js"></script>
  <script>
    renderNav('patients', 'pp-vitals', '../../../');
    
    let vsData = [];
    let currentSubject = null;
    let charts = {};
    
    // R: meas_lbl <- c(DIABP_VSORRES = "Diastolic Blood Pressure", HR_VSORRES = "Heart Rate", ...)
    const measurements = {
      SYSBP_VSORRES: { label: 'Systolic Blood Pressure', unit: 'SYSBP_VSORRESU' },
      DIABP_VSORRES: { label: 'Diastolic Blood Pressure', unit: 'DIABP_VSORRESU' },
      HR_VSORRES: { label: 'Heart Rate', unit: 'HR_VSORRESU' },
      RESP_VSORRES: { label: 'Respiration Rate', unit: 'RESP_VSORRESU' }
    };
    
    function parseSasDateTime(str) {
      if (!str) return null;
      const months = {JAN:0,FEB:1,MAR:2,APR:3,MAY:4,JUN:5,JUL:6,AUG:7,SEP:8,OCT:9,NOV:10,DEC:11};
      const match = str.match(/^(\d{2})([A-Z]{3})(\d{4})/i);
      if (match) return new Date(parseInt(match[3]), months[match[2].toUpperCase()], parseInt(match[1]));
      return null;
    }
    
    async function loadData() {
      return new Promise(res => {
        Papa.parse('../../../data/vs.CSV', { 
          download: true, 
          header: true, 
          skipEmptyLines: true, 
          complete: r => { 
            vsData = r.data; 
            console.log('VS data loaded:', vsData.length, 'rows');
            if (vsData.length > 0) console.log('Columns:', Object.keys(vsData[0]));
            res(); 
          }, 
          error: (err) => {
            console.error('Error loading VS data:', err);
            res();
          }
        });
      });
    }
    
    function populateSubjects() {
      if (!vsData || vsData.length === 0) {
        console.error('No VS data available');
        document.getElementById('subjectSelect').innerHTML = '<option value="">No data available</option>';
        document.getElementById('chartsContainer').innerHTML = '<div class="no-data">No vital signs data available</div>';
        return;
      }
      
      const subjectCol = vsData[0].Subject ? 'Subject' : 
                        vsData[0].subject ? 'subject' : 
                        vsData[0].SUBJECT ? 'SUBJECT' : 'Subject';
      
      const subjects = [...new Set(vsData.map(r => r[subjectCol]))].filter(Boolean).sort();
      console.log('Found subjects:', subjects);
      
      const select = document.getElementById('subjectSelect');
      if (subjects.length === 0) {
        select.innerHTML = '<option value="">No subjects found</option>';
        document.getElementById('chartsContainer').innerHTML = '<div class="no-data">No subjects found in vital signs data</div>';
        return;
      }
      
      select.innerHTML = subjects.map(s => `<option value="${s}">${s}</option>`).join('');
      const params = new URLSearchParams(window.location.search);
      currentSubject = params.get('id') || subjects[0];
      if (subjects.includes(currentSubject)) select.value = currentSubject;
      else currentSubject = subjects[0];
      select.addEventListener('change', e => { currentSubject = e.target.value; history.replaceState(null, '', `?id=${currentSubject}`); renderCharts(); });
      renderCharts();
    }
    
    function renderCharts() {
      const container = document.getElementById('chartsContainer');
      const subj = currentSubject;
      Object.values(charts).forEach(c => c.destroy());
      charts = {};
      
      const subjectCol = vsData[0]?.Subject ? 'Subject' : 
                        vsData[0]?.subject ? 'subject' : 
                        vsData[0]?.SUBJECT ? 'SUBJECT' : 'Subject';
      
      // R: d$EOT <- ifelse(d$Folder == "DSET", "EOT", d$Folder)
      let data = vsData.filter(r => r[subjectCol] === subj).map(r => ({
        ...r,
        parsedDate: parseSasDateTime(r.VSDAT_INT),
        visit: r.Folder === 'DSET' ? 'EOT' : r.Folder
      })).filter(r => r.parsedDate).sort((a, b) => a.parsedDate - b.parsedDate);
      
      if (!data.length) { container.innerHTML = '<div class="no-data">No vital signs data</div>'; return; }
      
      const visits = [...new Set(data.map(r => r.visit))];
      console.log('Visits found:', visits);
      console.log('Data rows:', data.length);
      
      // First pass: collect charts with valid data
      const chartsToRender = [];
      for (const [key, config] of Object.entries(measurements)) {
        // Check all rows for this measurement, not just per visit
        const allValues = data.map(r => {
          if (!r || !r[key] || r[key] === '' || r[key] === 'NA') return null;
          const val = parseFloat(r[key]);
          return (val !== null && !isNaN(val) && isFinite(val)) ? val : null;
        });
        
        // Only include chart if there's at least one valid numeric value in the entire dataset
        const validValues = allValues.filter(v => v !== null && !isNaN(v) && isFinite(v));
        console.log(`${config.label} (${key}): ${validValues.length} valid values out of ${allValues.length} total`);
        
        if (validValues.length === 0) {
          console.log(`Skipping ${config.label} - no valid data found`);
          continue;
        }
        
        // Now get values per visit
        const values = visits.map(v => {
          const row = data.find(r => r.visit === v);
          if (!row || !row[key] || row[key] === '' || row[key] === 'NA') return null;
          const val = parseFloat(row[key]);
          return (val !== null && !isNaN(val) && isFinite(val)) ? val : null;
        });
        
        // Final check: ensure we have at least one valid value per visit
        const visitValidValues = values.filter(v => v !== null && !isNaN(v) && isFinite(v));
        if (visitValidValues.length === 0) {
          console.log(`Skipping ${config.label} - no valid values per visit`);
          continue;
        }
        
        chartsToRender.push({ key, config, values });
      }
      
      console.log(`Charts to render: ${chartsToRender.length} out of ${Object.keys(measurements).length}`);
      
      // Only create HTML for charts with data
      if (chartsToRender.length === 0) {
        console.log('No charts to render - showing no data message');
        container.innerHTML = '<div class="no-data">No vital signs data available for this subject</div>';
        return;
      }
      
      console.log('Creating HTML for', chartsToRender.length, 'charts');
      let html = '';
      chartsToRender.forEach(({ key, config }) => {
        html += `<div class="chart-card"><h4>${config.label}</h4><div class="chart-wrapper"><canvas id="chart_${key}"></canvas></div></div>`;
      });
      container.innerHTML = html;
      
      // Render only charts with valid data
      for (const { key, config, values } of chartsToRender) {
        // Double-check: ensure we have at least one valid value
        const validValues = values.filter(v => v !== null && !isNaN(v) && isFinite(v));
        if (validValues.length === 0) {
          console.warn(`Skipping chart render for ${config.label} - no valid values after processing`);
          // Remove the chart card if no valid data
          const chartCard = document.querySelector(`#chart_${key}`)?.closest('.chart-card');
          if (chartCard) chartCard.remove();
          continue;
        }
        
        const unit = data[0][config.unit] || 'Unknown';
        
        // R plot style: geom_line + geom_point(shape = 21, fill = "red", size = 3) + geom_text
        const ctx = document.getElementById(`chart_${key}`).getContext('2d');
        if (!ctx) {
          console.error(`Canvas not found for ${key}`);
          continue;
        }
        charts[key] = new Chart(ctx, {
          type: 'line',
          data: {
            labels: visits,
            datasets: [{
              label: config.label,
              data: values,
              borderColor: '#333',
              backgroundColor: 'red',
              pointBackgroundColor: 'red',
              pointBorderColor: '#333',
              pointRadius: 6,
              pointStyle: 'circle',
              tension: 0,
              fill: false
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: ctx => `${ctx.parsed.y} ${unit}` } },
              yAxisTitleBorder: true
            },
            scales: {
              x: { title: { display: true, text: 'Visit' }, ticks: { maxRotation: 45 } },
              y: { 
                title: { 
                  display: true, 
                  text: `Measurement (${unit})`,
                  font: { size: 12, weight: 'bold' }
                }, 
                beginAtZero: false,
                ticks: {
                  font: { size: 11 }
                }
              }
            }
          }
        });
      }
    }
    
    loadData().then(() => {
      populateSubjects();
      if (typeof initBlockExportDialog === 'function') {
        initBlockExportDialog();
        setBlockExportPrefix('Patient_Vitals');
      }
    });
  </script>
</body>
</html>
</html>
